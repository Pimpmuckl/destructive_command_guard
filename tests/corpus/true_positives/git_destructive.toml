[[case]]
description = "git stash drop discards stash"
command = "git stash drop"
expected = "deny"
rule_id = "core.git:stash-drop"

[[case]]
description = "git stash clear drops all stashes"
command = "git stash clear"
expected = "deny"
rule_id = "core.git:stash-clear"

[[case]]
description = "git branch -D force deletes"
command = "git branch -D feature-branch"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "git branch -d deletes a merged branch ref"
command = "git branch -d merged-branch"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "git branch --delete removes a branch ref"
command = "git branch --delete merged-branch"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "git branch combined short flags delete a branch ref"
command = "git branch -vd merged-branch"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "git branch unique delete abbreviation removes a branch ref"
command = "git branch --del merged-branch"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "git branch negated format takes no value before delete"
command = "git branch --no-format -d merged-branch"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "git branch uppercase move overwrites an existing ref"
command = "git branch -M old-name existing-name"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "git branch uppercase copy overwrites an existing ref"
command = "git branch -C old-name existing-name"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "mixed-case Windows git executable still deletes a branch"
command = "gIt.ExE branch --delete merged-branch"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "literal POSIX substitutions cannot splice a hidden branch deletion"
command = "g$(printf it) br$(printf anch) -$(printf d) merged-branch"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "unresolved POSIX output cannot occupy a branch option role"
command = "git branch $(branch_option_producer)"
expected = "deny"
rule_id = "core.git:branch-force-delete"

[[case]]
description = "literal POSIX substitutions cannot splice reset hard"
command = "g$(printf it) re$(printf set) --ha$(printf rd)"
expected = "deny"
rule_id = "core.git:reset-hard"

[[case]]
description = "git push --force"
command = "git push --force origin main"
expected = "deny"
rule_id = "core.git:push-force-long"

[[case]]
description = "git push -f (short form)"
command = "git push -f origin main"
expected = "deny"
rule_id = "core.git:push-force-short"
